<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/aboutus.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <nav class="flex items-center justify-between px-8 py-4 bg-black text-sm md:text-lg">

        <a href="index.html" class="py-1 font-bold text-white text-lg md:px-3 md:text-2xl">
            Game Recommended
        </a>

        <a href="aboutus.html" class="text-white">About Us</a>
    </nav>

    <section class="relative h-[45vh] md:h-[73vh] flex items-center">

        <!-- Background -->
        <img class="absolute w-full h-full object-cover opacity-70" id="gameImage" >

        <!-- Overlay -->
        <div class="absolute w-full h-full bg-gradient-to-l from-black via-black/70 to-transparent"></div>

        <!-- Content -->
        <div class="relative z-10 max-w-2xl ml-auto mr-24">

            <h1 class="text-3xl font-bold tracking-wide text-white" id="gameTitle"></h1>

            <div class="flex gap-4 mt-8 justify-end">
                <button class="bg-white text-black px-6 py-3 rounded-full font-semibold scale-loop hover:bg-gray-200" onclick="goToDetail()">
                    Details
                </button>
            </div>

        </div>

        <button class="absolute text-white left-6 bg-black/50 p-3 rounded hover:bg-black" onclick="prevGame()">
            ❮
        </button>

        <button class="absolute text-white right-6 bg-black/50 p-3 rounded hover:bg-black" onclick="nextGame()">
            ❯
        </button>

        <div id="dots" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-3"></div>
    </section>

    <section class="bg-gray-100 py-16 px-10 md:px-20">

        <h2 class="text-5xl font-bold mb-10">
            Featured Games
        </h2>

        <div id="featuredGames" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>

    </section>

    <footer class="text-center py-8 text-gray-500 text-sm">
        เว็บไซต์นี้สร้างขึ้นเพื่อการศึกษาเพียงเท่านั้น ไม่ได้มีเจตนาเพื่อการละเมิดลิขสิทธิ์ | 2026
    </footer>

    <script src="js/home.js"></script>
</body>
</html>
